kind: pipeline
type: docker
name: nestjs_api_ci

steps:
- name: install_dependencies
  image: node:current-alpine
  commands:
    - npm install -g pnpm
    - pnpm install
  when:
    branch:
      - develop
      - release/*
      - master
    event:
      - push

- name: nest_build
  image: node:current-alpine
  commands:
  - npm i
  - npm run build
  - ls
  when:
    branch:
    - develop
    - release/*
    - master
    - feature/*
    event:
    - push

- name: run_sonar_scanner
  image: sonarsource/sonar-scanner-cli:latest
  environment:
    SONAR_HOST_URL:
      from_secret: SONAR_HOST
    SONAR_TOKEN:
      from_secret: SONAR_TOKEN
    SONAR_SCANNER_OPTS: "-Dsonar.working.directory=/tmp/.scannerwork"
  commands:
    - sonar-scanner
  when:
    branch:
      - feature/*
      - develop
      - release/*
      - hotfix/*
      - master
    event:
    - push

- name: publish_to_ecr_release
  image: plugins/ecr
  settings:
    access_key:
      from_secret: AWS_ACCESS_KEY_ID
    secret_key:
      from_secret: AWS_SECRET_ACCESS_KEY
    region:
      from_secret: AWS_REGION
    repo: ${DRONE_REPO##udistrital/}
    tags:
      - ${DRONE_COMMIT:0:7}
      - release
  when:
    branch:
    - release/*
    
    event:
    - push

- name: publish_to_ecr_master
  image: plugins/ecr
  settings:
    access_key:
      from_secret: AWS_ACCESS_KEY_ID
    secret_key:
      from_secret: AWS_SECRET_ACCESS_KEY
    region:
      from_secret: AWS_REGION
    repo: ${DRONE_REPO##udistrital/}
    tags:
      - ${DRONE_COMMIT:0:7}
      - latest
  when:
    branch:
    - master
    event:
    - push

- name: update_aws_ecs
  image: amazon/aws-cli
  environment:
    AWS_ACCESS_KEY_ID:
      from_secret: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY:
      from_secret: AWS_SECRET_ACCESS_KEY
    AWS_CONTAINER:
      from_secret: AWS_CONTAINER
  commands:
  - case ${DRONE_BRANCH} in
       release/*)
         AMBIENTE=test
         CLUSTER=test
         MYCONTAINER=$${AWS_CONTAINER}/${DRONE_REPO##udistrital/}:release
         ;;
       master)
         AMBIENTE=prod
         CLUSTER=oas
         MYCONTAINER=$${AWS_CONTAINER}/${DRONE_REPO##udistrital/}:latest
         ;;
    esac
  - AWS_REGION=us-east-1
  - SERVICE=${DRONE_REPO##udistrital/}_$AMBIENTE
  - MYCONTAINER=oas0/${DRONE_REPO##udistrital/}:${DRONE_COMMIT:0:7}
  - aws ecs update-service --cluster $CLUSTER --service $SERVICE --force-new-deployment
  when:
    branch:
    - release/*
    - master
    event:
    - push
