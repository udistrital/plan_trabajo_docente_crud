kind: pipeline
type: docker
name: nestjs_api_ci

steps:
- name: install_dependencies
  image: node:current-alpine
  commands:
    - npm install -g pnpm
    - pnpm install
  when:
    branch:
      - develop
      - release/*
      - master
    event:
      - push

- name: nest_build
  image: node:current-alpine
  commands:
  - npm i
  - npm run build
  - ls
  when:
    branch:
    - develop
    - release/*
    - master
    - feature/*
    event:
    - push

- name: run_sonar_scanner
  image: sonarsource/sonar-scanner-cli:latest
  environment:
    SONAR_HOST_URL:
      from_secret: SONAR_HOST
    SONAR_TOKEN:
      from_secret: SONAR_TOKEN
    SONAR_SCANNER_OPTS: "-Dsonar.working.directory=/tmp/.scannerwork"
  commands:
    - sonar-scanner
  when:
    branch:
      - feature/*
      - develop
      - release/*
      - hotfix/*
      - master
    event:
    - push

- name: publish_to_ecr_release
  image: plugins/ecr
  settings:
    access_key:
      from_secret: AWS_ACCESS_KEY_ID
    create_repository: true
    region:
      from_secret: AWS_REGION
    repo: ${DRONE_REPO_NAME}
    secret_key:
      from_secret: AWS_SECRET_ACCESS_KEY
    tags:
      - ${DRONE_COMMIT:0:7}
      - release
  when:
    branch:
      - release/*
    event:
      - push

- name: publish_to_ecr_prod
  image: plugins/ecr
  settings:
    access_key:
      from_secret: AWS_ACCESS_KEY_ID
    create_repository: true
    region:
      from_secret: AWS_REGION
    repo: ${DRONE_REPO_NAME}
    secret_key:
      from_secret: AWS_SECRET_ACCESS_KEY
    tags:
      - ${DRONE_COMMIT:0:7}
      - latest
  when:
    branch:
      - master
    event:
      - push

- name: update_ecs_service
  image: amazon/aws-cli:latest
  environment:
    AWS_ACCESS_KEY_ID:
      from_secret: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY:
      from_secret: AWS_SECRET_ACCESS_KEY
    AWS_DEFAULT_REGION:
      from_secret: AWS_REGION
  commands:
  - case ${DRONE_BRANCH} in
    master)
    SUFFIX=prod
    CLUSTER=oas
      ;;
    *)
    SUFFIX=test
    CLUSTER=test
      ;;
    esac
  - aws ecs update-service
    --cluster $${CLUSTER}
    --service $${DRONE_REPO_NAME}_$${SUFFIX}
    --force-new-deployment
    --query "service.deployments[0].id"
  when:
    branch:
      - release/*
      - master
    event:
      - push
