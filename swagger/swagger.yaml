info:
  title: plan_trabajo_docente_crud
  description: >-
    API CRUD para el registro de planes de trabajo docente para el cliente de
    SGA
  version: '1.0'
  contact: {}
tags:
  - name: plan_trabajo_docente
    description: ''
servers: []
components:
  schemas:
    ActividadDto:
      type: object
      properties:
        nombre:
          type: string
        descripcion:
          type: string
        codigo_abreviacion:
          type: string
        activo:
          type: boolean
        fecha_creacion:
          format: date-time
          type: string
        fecha_modificacion:
          format: date-time
          type: string
      required:
        - nombre
        - descripcion
        - codigo_abreviacion
        - activo
        - fecha_creacion
        - fecha_modificacion
    CargaPlanDto:
      type: object
      properties:
        espacio_academico_id:
          type: string
        actividad_id:
          type: string
        plan_docente_id:
          type: string
        colocacion_espacio_academico_id:
          type: string
        salon_id:
          type: string
        hora_inicio:
          type: number
        duracion:
          type: number
        activo:
          type: boolean
        fecha_creacion:
          format: date-time
          type: string
        fecha_modificacion:
          format: date-time
          type: string
      required:
        - espacio_academico_id
        - actividad_id
        - plan_docente_id
        - colocacion_espacio_academico_id
        - salon_id
        - hora_inicio
        - duracion
        - activo
        - fecha_creacion
        - fecha_modificacion
    ConsolidadoDocenteDto:
      type: object
      properties:
        plan_docente_id:
          type: string
        periodo_id:
          type: string
        proyecto_academico_id:
          type: string
        estado_consolidado_id:
          type: string
        respuesta_decanatura:
          type: string
        consolidado_coordinacion:
          type: string
        cumple_normativa:
          type: boolean
        aprobado:
          type: boolean
        activo:
          type: boolean
        fecha_creacion:
          format: date-time
          type: string
        fecha_modificacion:
          format: date-time
          type: string
      required:
        - plan_docente_id
        - periodo_id
        - proyecto_academico_id
        - estado_consolidado_id
        - respuesta_decanatura
        - consolidado_coordinacion
        - cumple_normativa
        - aprobado
        - activo
        - fecha_creacion
        - fecha_modificacion
    EstadoConsolidadoDto:
      type: object
      properties:
        nombre:
          type: string
        descripcion:
          type: string
        codigo_abreviacion:
          type: string
        activo:
          type: boolean
        fecha_creacion:
          format: date-time
          type: string
        fecha_modificacion:
          format: date-time
          type: string
      required:
        - nombre
        - descripcion
        - codigo_abreviacion
        - activo
        - fecha_creacion
        - fecha_modificacion
    EstadoPlanDto:
      type: object
      properties:
        nombre:
          type: string
        descripcion:
          type: string
        codigo_abreviacion:
          type: string
        activo:
          type: boolean
        fecha_creacion:
          format: date-time
          type: string
        fecha_modificacion:
          format: date-time
          type: string
      required:
        - nombre
        - descripcion
        - codigo_abreviacion
        - activo
        - fecha_creacion
        - fecha_modificacion
    PlanDocenteDto:
      type: object
      properties:
        estado_plan_id:
          type: string
        docente_id:
          type: string
        tipo_vinculacion_id:
          type: string
        periodo_id:
          type: string
        soporte_documental:
          type: string
        respuesta:
          type: string
        resumen:
          type: string
        activo:
          type: boolean
        fecha_creacion:
          format: date-time
          type: string
        fecha_modificacion:
          format: date-time
          type: string
      required:
